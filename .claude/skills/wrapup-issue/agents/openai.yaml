interface:
  display_name: "Wrap Up Issue"
  short_description: "Audit, test, commit, push feature branch, open PR against dev, and sync Linear to In Review"
  default_prompt: "Run the wrapup-issue workflow: audit the diff using session context, run available tests and linting, create detailed commits via git-commit-writer, push the feature branch to origin, open a PR against dev with a detailed body, and update the Linear issue to In Review with explicit approval gates for risky steps."
