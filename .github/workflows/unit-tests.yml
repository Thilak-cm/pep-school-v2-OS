name: Unit Tests

on:
  push:
    branches:
      - master
      - dev
      - alt-dev
    paths:
      - 'montessori-os/src/**'
      - 'montessori-os/package.json'
      - 'montessori-os/test-loader.js'
      - 'montessori-os/test-setup.js'
      - 'functions/utils/**'
      - 'functions/config/**'
      - 'functions/test/**'
      - 'functions/index.js'
      - 'firestore.rules'
      - '.github/workflows/unit-tests.yml'
  pull_request:
    branches:
      - master
      - dev
      - alt-dev
    paths:
      - 'montessori-os/src/**'
      - 'montessori-os/package.json'
      - 'montessori-os/test-loader.js'
      - 'montessori-os/test-setup.js'
      - 'functions/utils/**'
      - 'functions/config/**'
      - 'functions/test/**'
      - 'functions/index.js'
      - 'firestore.rules'

jobs:
  frontend_tests:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: montessori-os
        run: npm install

      - name: Lint
        working-directory: montessori-os
        run: npm run lint

      - name: Run unit tests
        working-directory: montessori-os
        run: npm test

  functions_tests:
    name: Functions Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: functions
        run: npm install

      - name: Lint
        working-directory: functions
        run: npm run lint

      - name: Run unit tests
        working-directory: functions
        shell: bash
        run: |
          shopt -s globstar
          node --test test/**/*.test.mjs
